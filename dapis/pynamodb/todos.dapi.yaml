schema: https://opendapi.org/spec/0-0-1/dapi.json
urn: todos.dapis.todos
type: entity
description: The DAPI for the core model of the Todos app, which includes information
  about individual todo entries and their status.
owner_team_urn: todos.team.engineering
datastores:
  producers:
  - urn: todos.datastores.dynamodb
    data:
      identifier: todos
      namespace: ''
  consumers:
  - urn: todos.datastores.snowflake
    data:
      identifier: PRODUCTION_TODOS
      namespace: TODOS.DYNAMODB
fields:
- name: checked
  data_type: boolean
  description: Indicates whether a specific todo entry has been completed or not.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: createdAt
  data_type: string
  description: The date and time when this todo entry was created.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: deletedAt
  data_type: string
  description: The date and time when this todo entry was deleted, if applicable.
  is_nullable: true
  is_pii: false
  share_status: unstable
- name: is_active
  data_type: boolean
  description: Indicates whether the todo entry is currently active or not.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: text
  data_type: string
  description: The actual content of the todo entry, which may contain personally
    identifiable information.
  is_nullable: false
  is_pii: true
  share_status: unstable
- name: todo_id
  data_type: string
  description: A publicly used identifier for the todo entry.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: updatedAt
  data_type: string
  description: The date and time when this todo entry was last updated.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: user_id
  data_type: string
  description: The unique identifier of the user associated with the todo entry.
  is_nullable: false
  is_pii: true
  share_status: unstable
primary_key:
- todo_id
