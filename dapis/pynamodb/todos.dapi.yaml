schema: https://opendapi.org/spec/0-0-1/dapi.json
urn: todos.dapis.todos
type: entity
description: Todos app core model. This DAPI contains information about the todos
  created in the Todos app, including their completion status, creation and update
  timestamps, and user identifiers. The dataset represents the core data model for
  the Todos app, capturing the details of each todo entry and its associated metadata.
owner_team_urn: todos.team.engineering
datastores:
  producers:
  - urn: todos.datastores.dynamodb
    data:
      identifier: todos
      namespace: ''
  - urn: todos.datastores.snowflake
    data:
      identifier: PRODUCTION_TODOS
      namespace: TODOS.DYNAMODB
  consumers:
  - urn: todos.datastores.snowflake
    data:
      identifier: PRODUCTION_TODOS
      namespace: TODOS.DYNAMODB
fields:
- name: checked
  data_type: boolean
  description: Indicates if a todo is completed or not. It is a boolean field with
    a value of true for completed todos and false for pending todos.
  is_nullable: false
  is_pii: false
  share_status: stable
- name: createdAt
  data_type: string
  description: The date and time when this todo entry was created, in ISO 8601 format.
  is_nullable: false
  is_pii: false
  share_status: stable
- name: text
  data_type: string
  description: The description or content of the todo action. It contains sensitive
    information about the todos and is considered as PII.
  is_nullable: false
  is_pii: true
  share_status: stable
- name: todo_id
  data_type: string
  description: The unique identifier for the todo entry. It is a public identifier
    for the todo.
  is_nullable: false
  is_pii: false
  share_status: stable
- name: updatedAt
  data_type: string
  description: The date and time when this todo entry was last updated, in ISO 8601
    format.
  is_nullable: false
  is_pii: false
  share_status: stable
primary_key:
- todo_id
