schema: https://opendapi.org/spec/0-0-1/dapi.json
urn: todos.dapis.todos
type: entity
description: The core model for the Todos application, which includes information
  about the todos, their status, and relevant timestamps.
owner_team_urn: todos.team.engineering
datastores:
  producers:
  - urn: todos.datastores.dynamodb
    data:
      identifier: todos
      namespace: ''
  consumers:
  - urn: todos.datastores.snowflake
    data:
      identifier: PRODUCTION_TODOS
      namespace: TODOS.DYNAMODB
fields:
- name: checked
  data_type: boolean
  description: Indicates if a todo is completed. It is a boolean flag where 'true'
    means the todo is completed and 'false' means the todo is pending or not completed.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: createdAt
  data_type: string
  description: The date and time when this todo entry was created, represented as
    a string in ISO 8601 format.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: deletedAt
  data_type: string
  description: The date and time when this todo entry was deleted, represented as
    a string in ISO 8601 format. This field is nullable.
  is_nullable: true
  is_pii: false
  share_status: unstable
- name: is_active
  data_type: boolean
  description: Indicates if the todo entry is active. It is a boolean flag where 'true'
    means the todo is active and 'false' means the todo is inactive or deleted.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: text
  data_type: string
  description: The text content of the todo action. This field may contain Personally
    Identifiable Information (PII) and should be handled with appropriate security
    measures.
  is_nullable: false
  is_pii: true
  share_status: unstable
- name: todo_id
  data_type: string
  description: Publicly used identifier for the todo entry. It uniquely identifies
    a todo item in the system.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: updatedAt
  data_type: string
  description: The date and time when this todo entry was last updated, represented
    as a string in ISO 8601 format.
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: user_id
  data_type: string
  description: The user identifier associated with the todo entry. This field may
    contain Personally Identifiable Information (PII) and should be handled with appropriate
    security measures.
  is_nullable: false
  is_pii: true
  share_status: unstable
primary_key:
- todo_id
