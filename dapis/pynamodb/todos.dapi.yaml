schema: https://opendapi.org/spec/0-0-1/dapi.json
urn: todos.dapis.todos
type: entity
description: Todos app core model. This DAPI represents the core model for the Todos
  app, containing information about individual todo items and their status.
owner_team_urn: todos.team.engineering
datastores:
  producers:
  - urn: todos.datastores.dynamodb
    data:
      identifier: todos
      namespace: ''
  consumers:
  - urn: todos.datastores.snowflake
    data:
      identifier: PRODUCTION_TODOS
      namespace: TODOS.DYNAMODB
fields:
- name: checked
  data_type: boolean
  description: Indicates whether a todo item is completed or not
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: createdAt
  data_type: string
  description: Date and time when this entry was created
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: deletedAt
  data_type: string
  description: Date and time when this entry was deleted
  is_nullable: false
  is_pii: true
  share_status: unstable
- name: is_private
  data_type: boolean
  description: Indicates whether the todo item is private or public
  is_nullable: false
  is_pii: true
  share_status: unstable
- name: text
  data_type: string
  description: The description or content of the todo item
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: todo_id
  data_type: string
  description: Publicly used identifier for the todo entry
  is_nullable: false
  is_pii: false
  share_status: unstable
- name: updatedAt
  data_type: string
  description: Date and time when this entry was last updated
  is_nullable: false
  is_pii: false
  share_status: unstable
primary_key:
- todo_id
